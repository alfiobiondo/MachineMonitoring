<section
  class="header-alarms"
  [class.header-alarms--blocking]="hasBlockingAlarms()"
  aria-label="Allarmi attivi"
>
  <button
    class="header-alarms__button"
    type="button"
    [attr.aria-expanded]="expanded()"
    (click)="toggle()"
  >
    <span>
      <span class="header-alarms__eyebrow">Allarmi</span>
      <strong>
        {{ activeAlarms().length }}
        {{ activeAlarms().length === 1 ? 'attivo' : 'attivi' }}
      </strong>
    </span>

    <span class="header-alarms__badge">
      {{ hasBlockingAlarms() ? blockingAlarms().length + ' bloccanti' : 'Nessun blocco' }}
      <span class="header-alarms__chevron" aria-hidden="true"></span>
    </span>
  </button>

  @if (expanded()) {
    <div class="header-alarms__panel">
      @if (activeAlarms().length > 0) {
        @for (alarm of activeAlarms(); track alarm.id) {
          <article class="header-alarms__item">
            <span class="header-alarms__code">{{ alarm.code }}</span>
            <strong>{{ alarm.severity }}</strong>
            <p>{{ alarm.message }}</p>
            <span>{{ alarm.isBlocking ? 'Blocca la lavorazione' : 'Non bloccante' }}</span>
          </article>
        }
      } @else {
        <p class="header-alarms__empty">Nessun allarme attivo.</p>
      }
    </div>
  }
</section>
